parameters:
    uploads_directory: 'C:\xampp\htdocs\uploads'
    stripe_secret_key: '%env(STRIPE_SECRET_KEY)%'
    stripe_public_key: '%env(STRIPE_PUBLIC_KEY)%'
    app.base_url: '%env(APP_URL)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    # 🔥 on exclut le service du scan automatique
    App\:
        resource: '../src/'
        exclude:
            - '../src/Service/ChatbotService.php'

    # 🔥 config manuelle (garde ton API key)
    App\Service\ChatbotService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

    App\Service\RecommandationService:
        arguments:
            $geminiApiKey: '%env(GEMINI_API_KEY)%'

    App\EventListener\NotificationListener:
        tags:
            - { name: kernel.event_listener, event: kernel.controller }

    App\Service\SmsService:
        arguments:
            $baseUrl: '%env(INFOBIP_BASE_URL)%'
            $apiKey: '%env(INFOBIP_API_KEY)%'
            $sender: '%env(INFOBIP_SENDER)%'